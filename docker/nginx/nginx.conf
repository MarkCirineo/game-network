# ArcadeKit — Nginx Site Config
# Copy to /etc/nginx/sites-available/arcadekit.games
# Then: sudo ln -s /etc/nginx/sites-available/arcadekit.games /etc/nginx/sites-enabled/
# Test: sudo nginx -t && sudo systemctl reload nginx

# WebSocket upgrade mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Rate limiting zones
# Room creation: 5 requests/minute per IP (burst of 3)
limit_req_zone $binary_remote_addr zone=create_room:10m rate=5r/m;
# General API: 30 requests/second per IP
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

upstream arcadekit_web {
    server 127.0.0.1:3010;
}

upstream arcadekit_gameserver {
    server 127.0.0.1:3011;
}

# ----------------------------------------------------------
# HTTP → HTTPS redirect (except ACME challenge)
# ----------------------------------------------------------
server {
    listen 80;
    server_name arcadekit.games;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ----------------------------------------------------------
# HTTPS server
# ----------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name arcadekit.games;

    # SSL certificates (managed by certbot on host)
    ssl_certificate     /etc/letsencrypt/live/arcadekit.games/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arcadekit.games/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # WebSocket proxy
    location /ws {
        proxy_pass http://arcadekit_gameserver;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Game server HTTP API — rate limited
    location /create-room {
        limit_req zone=create_room burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://arcadekit_gameserver;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /room-info/ {
        limit_req zone=api burst=10 nodelay;

        proxy_pass http://arcadekit_gameserver;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Next.js static assets (long cache)
    location /_next/static {
        proxy_pass http://arcadekit_web;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Everything else → Next.js
    location / {
        proxy_pass http://arcadekit_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
